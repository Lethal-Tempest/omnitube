<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: Arial, sans-serif;
      padding: 15px;
      margin: 0;
    }
    h3 { margin-top: 0; font-size: 14px; color: #333; }
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #cc0000;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled { background-color: #aaa; }
    #result {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.4;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h3>Ask YouTube Video AI</h3>
  <input type="text" id="questionInput" placeholder="e.g., What are the learning objectives?" disabled />
  <button id="askBtn" disabled>Ask AI</button>
  <div id="result">Detecting YouTube video...</div>

  <script src="popup.js"></script>
</body>
</html>
